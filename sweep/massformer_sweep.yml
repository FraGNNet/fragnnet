entity: fragnnet
project: fragnnet
program: ~/fragnnet/scripts/run_wandb_sweep.py
method: random
name: massformer_sweep
description: Optimize MassFormer hyperparameters for binned cosine similarity (0.01 Da)
metric:
  goal: maximize
  name: val_cos_sim_0.01_best/mean
parameters:
  # general optimization
  lr:
    distribution: log_uniform_values
    min: 0.0001 # 1e-4
    max: 0.001 # 1e-3
  lr_decay_rate:
    distribution: uniform
    min: 0.7
    max: 1.0
  weight_decay:
    values: [0., 0.0000001, 0.000001]
  train_batch_size:
    values: [32, 64, 128, 256]
  ints_transform:
    values: ["sqrt", "log10t3", "none"]
  # mlp-specific
  mlp_hidden_size:
    values: [256, 512, 1024]
  mlp_dropout:
    values: [0.0, 0.1, 0.2, 0.3, 0.4]
  mlp_num_layers:
    values: [1, 2, 3, 4, 5]
  ff_prec_mz_offset:
    values: [5, 50, 500]